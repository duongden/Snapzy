name: Build and Create DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  build-and-package:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Xcode project
        run: |
          xcodebuild -project Snapzy.xcodeproj -scheme Snapzy -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO build

      - name: Locate and prepare app bundle
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Snapzy.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "Snapzy.app" -type d | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find Snapzy.app"
            exit 1
          fi
          mkdir -p ./exported_app
          cp -R "$APP_PATH" ./exported_app/

      - name: Create DMG file
        uses: srtkk/create-dmg-action@v1.0.0
        with:
          app-path: './exported_app/Snapzy.app'
          dmg-name: 'Snapzy.dmg'

      - name: Upload DMG as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-DMG
          path: Snapzy.dmg

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ inputs.version }}
          release_name: Snapzy v${{ inputs.version }}
          body: ${{ inputs.release_notes }}
          draft: false
          prerelease: ${{ inputs.prerelease }}

      - name: Upload DMG to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./Snapzy.dmg
          asset_name: Snapzy-v${{ inputs.version }}.dmg
          asset_content_type: application/x-apple-diskimage
